<style>
:root{
  --bg:#0a0d18; --bg2:#10142a; --bg3:#181d3a; --rim:#22284a;
  --line:rgba(167,139,250,.16); --line-strong:rgba(167,139,250,.32);
  --text:#e9ecf6; --dim:#8d92b3; --faint:#4d5170;
  --L1:#56e6ff;       /* physical — cyan */
  --L2:#5ee2a0;       /* biological — green */
  --L3:#a78bfa;       /* cognitive — violet */
  --L4:#ffd166;       /* social — amber */
  --L5:#ff6b9d;       /* digital — magenta */
  --display:'IBM Plex Serif',serif;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--sans);line-height:1.65;-webkit-font-smoothing:antialiased;
  min-height:100vh;overflow-x:hidden;
}
body.zh{font-family:'Noto Sans SC',sans-serif;}
body.zh .display{font-family:'Noto Serif SC',serif;}
.display{font-family:var(--display);letter-spacing:-.012em;}
.mono{font-family:var(--mono);}
[data-en],[data-zh]{display:inline;}
body:not(.zh) [data-zh]{display:none;}
body.zh [data-en]{display:none;}
a{color:var(--L1);text-decoration:none;}
a:hover{color:var(--L3);}

/* ─── BACKGROUND ─── */
.bg-grid{position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(circle at 18% 22%,rgba(86,230,255,.05) 0%,transparent 45%),
    radial-gradient(circle at 82% 78%,rgba(255,107,157,.05) 0%,transparent 45%),
    radial-gradient(circle at 50% 50%,rgba(167,139,250,.04) 0%,transparent 60%),
    var(--bg);
  background-image:
    linear-gradient(rgba(167,139,250,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(167,139,250,.04) 1px, transparent 1px);
  background-size:60px 60px, 60px 60px, 100% 100%;
  background-position:center center;
}

/* ─── NAV ─── */
.nav{position:fixed;top:0;left:0;right:0;z-index:50;
  background:rgba(10,13,24,.78);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);}
.nav-inner{max-width:1320px;margin:0 auto;padding:14px 32px;
  display:flex;align-items:center;gap:20px;}
.brand{display:flex;align-items:center;gap:12px;font-weight:600;}
.brand-mark{width:32px;height:32px;border-radius:8px;
  background:radial-gradient(circle at 30% 30%,var(--L3),var(--bg2) 70%);
  border:1px solid var(--L3);position:relative;}
.brand-mark::after{content:"";position:absolute;inset:7px;border-radius:50%;
  background:linear-gradient(135deg,var(--L1),var(--L5));}
.brand-text{font-family:var(--display);font-size:1.15rem;font-weight:600;letter-spacing:-.01em;}
.nav-links{display:flex;gap:22px;margin-left:auto;}
.nav-links a{color:var(--dim);font-size:.82rem;font-weight:500;
  transition:color .15s;font-family:var(--mono);}
.nav-links a:hover{color:var(--L1);}
.lang-btn{padding:6px 14px;border:1px solid var(--line-strong);background:transparent;
  color:var(--text);border-radius:999px;font-family:var(--mono);font-size:.78rem;cursor:pointer;
  transition:all .15s;}
.lang-btn:hover{border-color:var(--L3);color:var(--L3);}
@media(max-width:880px){.nav-links{display:none;}}

section{padding:110px 32px;position:relative;}
.wrap{max-width:1320px;margin:0 auto;}
.eyebrow{display:inline-block;font-family:var(--mono);font-size:.74rem;
  color:var(--L1);letter-spacing:.2em;text-transform:uppercase;
  padding:5px 14px;border:1px solid var(--line-strong);border-radius:999px;
  margin-bottom:22px;}
h1{font-family:var(--display);font-size:clamp(2.4rem,6vw,5.4rem);
  line-height:1.02;letter-spacing:-.025em;margin-bottom:24px;font-weight:600;}
h2{font-family:var(--display);font-size:clamp(1.9rem,4.2vw,3.4rem);
  line-height:1.05;letter-spacing:-.02em;margin-bottom:14px;font-weight:600;}
h3{font-family:var(--display);font-size:1.4rem;font-weight:600;margin-bottom:8px;}
h4{font-family:var(--sans);font-size:.74rem;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;color:var(--L3);
  margin-bottom:14px;}
.lede{font-size:1.12rem;color:var(--dim);max-width:760px;line-height:1.7;}
.section-head{margin-bottom:48px;max-width:840px;}

/* ─── HERO ─── */
.hero{padding:160px 32px 80px;text-align:center;}
.hero h1{margin:0 auto 26px;max-width:1080px;}
.hero h1 .grad{background:linear-gradient(120deg,var(--L1) 0%,var(--L3) 35%,var(--L4) 65%,var(--L5));
  -webkit-background-clip:text;background-clip:text;color:transparent;}
.hero .lede{margin:0 auto 36px;font-size:1.18rem;}
.cta-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn{padding:13px 26px;border-radius:8px;font-family:var(--mono);font-size:.82rem;
  font-weight:500;cursor:pointer;transition:all .2s;
  display:inline-flex;align-items:center;gap:8px;border:1px solid transparent;}
.btn-pri{background:var(--L3);color:var(--bg);}
.btn-pri:hover{background:transparent;border-color:var(--L3);color:var(--L3);box-shadow:0 0 24px rgba(167,139,250,.4);}
.btn-sec{background:transparent;border-color:var(--line-strong);color:var(--text);}
.btn-sec:hover{border-color:var(--L1);color:var(--L1);}

/* ─── LAYER RAIL ─── */
.layer-rail{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;margin-top:80px;
  border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--line);}
@media(max-width:740px){.layer-rail{grid-template-columns:repeat(2,1fr);}}
@media(max-width:440px){.layer-rail{grid-template-columns:1fr;}}
.rail-cell{padding:24px 20px;background:var(--bg);position:relative;}
.rail-cell::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;}
.rail-cell.l1::before{background:var(--L1);} .rail-cell.l1 .id{color:var(--L1);}
.rail-cell.l2::before{background:var(--L2);} .rail-cell.l2 .id{color:var(--L2);}
.rail-cell.l3::before{background:var(--L3);} .rail-cell.l3 .id{color:var(--L3);}
.rail-cell.l4::before{background:var(--L4);} .rail-cell.l4 .id{color:var(--L4);}
.rail-cell.l5::before{background:var(--L5);} .rail-cell.l5 .id{color:var(--L5);}
.rail-cell .id{font-family:var(--mono);font-size:.7rem;letter-spacing:.16em;}
.rail-cell .name{font-family:var(--display);font-size:1.08rem;font-weight:600;margin:6px 0 4px;}
.rail-cell .scope{font-size:.78rem;color:var(--faint);font-family:var(--mono);}

/* ─── MODULE 1 — REALITY MAP ─── */
.map-stage{margin-top:30px;background:var(--bg2);border:1px solid var(--line);
  border-radius:14px;padding:28px;}
.map-zoom{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px;font-family:var(--mono);font-size:.74rem;}
.map-zoom button{padding:7px 14px;border:1px solid var(--line);background:transparent;
  color:var(--dim);border-radius:6px;cursor:pointer;transition:all .15s;}
.map-zoom button.active,.map-zoom button:hover{border-color:var(--L3);color:var(--L3);background:rgba(167,139,250,.06);}
.map-canvas{position:relative;height:520px;background:radial-gradient(ellipse at center,var(--bg3),var(--bg2));
  border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.map-canvas svg{width:100%;height:100%;display:block;}
.map-detail{margin-top:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:840px){.map-detail{grid-template-columns:1fr;}}
.scale-card{padding:20px;background:var(--bg3);border:1px solid var(--line);border-radius:10px;
  border-left:3px solid;}
.scale-card .num{font-family:var(--mono);font-size:.7rem;color:var(--dim);letter-spacing:.12em;}
.scale-card .what{font-family:var(--display);font-size:1.2rem;font-weight:600;margin:4px 0 6px;}
.scale-card .desc{font-size:.86rem;color:var(--text);line-height:1.65;}
.scale-card .ex{margin-top:10px;font-family:var(--mono);font-size:.74rem;color:var(--dim);}

/* ─── MODULE 2 — CAUSALITY ─── */
.cause-stage{margin-top:30px;background:var(--bg2);border:1px solid var(--line);
  border-radius:14px;padding:28px;}
.cause-input-row{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:16px;}
@media(max-width:600px){.cause-input-row{grid-template-columns:1fr;}}
.cause-input{padding:13px 18px;background:var(--bg3);border:1px solid var(--line-strong);
  border-radius:8px;color:var(--text);font-family:var(--sans);font-size:.95rem;outline:none;}
.cause-input:focus{border-color:var(--L3);}
.cause-presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;}
.cause-chip{padding:6px 12px;background:var(--bg3);border:1px solid var(--line);
  border-radius:999px;font-size:.78rem;color:var(--dim);cursor:pointer;
  transition:all .15s;font-family:var(--mono);}
.cause-chip:hover{border-color:var(--L1);color:var(--L1);}
.cause-tree{padding:24px;background:var(--bg3);border:1px solid var(--line);border-radius:10px;
  font-family:var(--sans);}
.cause-phenom{font-family:var(--display);font-size:1.4rem;font-weight:600;color:var(--L4);
  margin-bottom:18px;padding-bottom:14px;border-bottom:1px dashed var(--line);}
.cause-chain{display:flex;flex-direction:column;gap:6px;}
.cause-link{display:grid;grid-template-columns:auto 1fr;gap:14px;padding:10px 14px;
  background:var(--bg2);border:1px solid var(--line);border-radius:8px;
  border-left:3px solid;}
.cause-link.l1{border-left-color:var(--L1);} .cause-link.l1 .layer-tag{color:var(--L1);}
.cause-link.l2{border-left-color:var(--L2);} .cause-link.l2 .layer-tag{color:var(--L2);}
.cause-link.l3{border-left-color:var(--L3);} .cause-link.l3 .layer-tag{color:var(--L3);}
.cause-link.l4{border-left-color:var(--L4);} .cause-link.l4 .layer-tag{color:var(--L4);}
.cause-link.l5{border-left-color:var(--L5);} .cause-link.l5 .layer-tag{color:var(--L5);}
.cause-link .step{font-family:var(--mono);font-size:.75rem;color:var(--dim);min-width:54px;}
.cause-link .text{font-size:.94rem;}
.cause-link .layer-tag{font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;
  margin-bottom:3px;text-transform:uppercase;display:block;}
.cause-arrow{text-align:center;color:var(--faint);font-size:1.2rem;line-height:1;margin:2px 0;}
.cause-summary{margin-top:18px;padding:14px 16px;background:var(--bg2);border:1px solid var(--line);
  border-radius:8px;font-style:italic;color:var(--dim);font-size:.92rem;}
.cause-summary strong{color:var(--L3);font-style:normal;}

/* ─── MODULE 3 — HIDDEN STRUCTURES ─── */
.hid-stage{margin-top:30px;display:grid;grid-template-columns:280px 1fr;gap:24px;}
@media(max-width:880px){.hid-stage{grid-template-columns:1fr;}}
.hid-list{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:18px;
  display:flex;flex-direction:column;gap:6px;}
.hid-item{padding:12px 14px;border:1px solid var(--line);border-radius:8px;cursor:pointer;
  transition:all .2s;background:var(--bg3);}
.hid-item:hover{border-color:var(--L1);}
.hid-item.active{border-color:var(--L3);background:rgba(167,139,250,.08);}
.hid-item .name{font-family:var(--display);font-size:1.04rem;font-weight:600;margin-bottom:3px;}
.hid-item .visible{font-family:var(--mono);font-size:.7rem;color:var(--dim);letter-spacing:.08em;}
.hid-detail{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:30px;}
.hid-detail .surface{font-family:var(--mono);font-size:.74rem;color:var(--L4);
  letter-spacing:.14em;margin-bottom:6px;text-transform:uppercase;}
.hid-detail .name{font-family:var(--display);font-size:2rem;font-weight:600;margin-bottom:18px;}
.hid-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
@media(max-width:780px){.hid-row{grid-template-columns:1fr;}}
.hid-card{padding:18px;background:var(--bg3);border:1px solid var(--line);border-radius:10px;
  border-top:3px solid;}
.hid-card.incentives{border-top-color:var(--L4);}
.hid-card.power{border-top-color:var(--L5);}
.hid-card.info{border-top-color:var(--L1);}
.hid-card .k{font-family:var(--mono);font-size:.7rem;color:var(--dim);
  letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;}
.hid-card h5{font-family:var(--display);font-size:1.1rem;font-weight:600;margin-bottom:8px;}
.hid-card p{font-size:.88rem;color:var(--text);line-height:1.65;}
.hid-card ul{margin-top:8px;margin-left:14px;color:var(--dim);font-size:.84rem;}
.hid-card ul li{margin-bottom:4px;}
.hid-detail .punch{padding:18px;background:var(--bg3);border:1px solid var(--line);
  border-radius:10px;font-family:var(--display);font-size:1.05rem;font-style:italic;color:var(--text);}
.hid-detail .punch::before{content:"⌂  ";color:var(--L5);}

/* ─── MODULE 4 — SIMULATOR ─── */
.sim-stage{margin-top:30px;background:var(--bg2);border:1px solid var(--line);
  border-radius:14px;padding:28px;display:grid;grid-template-columns:340px 1fr;gap:28px;}
@media(max-width:900px){.sim-stage{grid-template-columns:1fr;}}
.sim-vars{display:flex;flex-direction:column;gap:18px;}
.sim-var{padding:14px;background:var(--bg3);border:1px solid var(--line);border-radius:10px;}
.sim-var .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.sim-var .lbl{font-family:var(--display);font-size:.96rem;font-weight:600;}
.sim-var .val{font-family:var(--mono);font-size:.86rem;color:var(--L3);font-weight:500;}
.sim-var input[type=range]{-webkit-appearance:none;width:100%;height:4px;
  background:var(--rim);border-radius:2px;outline:none;}
.sim-var input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;background:var(--L3);
  border-radius:50%;cursor:pointer;}
.sim-var .hint{font-family:var(--mono);font-size:.7rem;color:var(--dim);margin-top:6px;}
.sim-effects{display:flex;flex-direction:column;gap:10px;}
.sim-fx{padding:14px 18px;background:var(--bg3);border:1px solid var(--line);border-radius:8px;
  border-left:3px solid;display:grid;grid-template-columns:80px 1fr 80px;gap:14px;align-items:center;}
.sim-fx.l1{border-left-color:var(--L1);} .sim-fx.l1 .tag{color:var(--L1);}
.sim-fx.l2{border-left-color:var(--L2);} .sim-fx.l2 .tag{color:var(--L2);}
.sim-fx.l3{border-left-color:var(--L3);} .sim-fx.l3 .tag{color:var(--L3);}
.sim-fx.l4{border-left-color:var(--L4);} .sim-fx.l4 .tag{color:var(--L4);}
.sim-fx.l5{border-left-color:var(--L5);} .sim-fx.l5 .tag{color:var(--L5);}
.sim-fx .tag{font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;}
.sim-fx .desc{font-size:.9rem;color:var(--text);}
.sim-fx .delta{font-family:var(--mono);font-size:.86rem;text-align:right;color:var(--L4);}
.sim-fx .delta.dn{color:var(--L5);}
.sim-fx .delta.up{color:var(--L2);}

/* ─── MODULE 5 — KNOWLEDGE GRAPH ─── */
.kg-stage{margin-top:30px;background:var(--bg2);border:1px solid var(--line);
  border-radius:14px;padding:28px;}
.kg-controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;align-items:center;}
.kg-search{flex:1;min-width:200px;padding:9px 14px;background:var(--bg3);
  border:1px solid var(--line-strong);border-radius:8px;color:var(--text);
  font-family:var(--sans);font-size:.86rem;outline:none;}
.kg-search:focus{border-color:var(--L3);}
.kg-filter{padding:7px 12px;background:var(--bg3);border:1px solid var(--line);
  border-radius:6px;color:var(--dim);font-family:var(--mono);font-size:.74rem;cursor:pointer;}
.kg-filter.l1.active{border-color:var(--L1);color:var(--L1);background:rgba(86,230,255,.06);}
.kg-filter.l2.active{border-color:var(--L2);color:var(--L2);background:rgba(94,226,160,.06);}
.kg-filter.l3.active{border-color:var(--L3);color:var(--L3);background:rgba(167,139,250,.06);}
.kg-filter.l4.active{border-color:var(--L4);color:var(--L4);background:rgba(255,209,102,.06);}
.kg-filter.l5.active{border-color:var(--L5);color:var(--L5);background:rgba(255,107,157,.06);}
.kg-canvas{height:600px;background:radial-gradient(ellipse at center,var(--bg3),var(--bg2));
  border:1px solid var(--line);border-radius:10px;overflow:hidden;position:relative;}
.kg-canvas svg{width:100%;height:100%;display:block;}
.kg-info{position:absolute;bottom:18px;left:18px;right:18px;max-width:520px;
  padding:18px;background:rgba(16,20,42,.92);backdrop-filter:blur(10px);
  border:1px solid var(--line-strong);border-radius:10px;display:none;}
.kg-info.show{display:block;}
.kg-info .layer{font-family:var(--mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;}
.kg-info .name{font-family:var(--display);font-size:1.3rem;font-weight:600;margin:4px 0 8px;}
.kg-info p{font-size:.88rem;color:var(--dim);line-height:1.6;}
.kg-info .links{margin-top:10px;font-family:var(--mono);font-size:.74rem;color:var(--faint);}
.kg-info .links strong{color:var(--L3);}

/* ─── STRIPS ─── */
.strip{padding:74px 32px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,var(--bg2),var(--bg));}
.strip-quote{font-family:var(--display);font-size:clamp(1.7rem,3.4vw,2.6rem);
  font-style:italic;text-align:center;max-width:980px;margin:0 auto;
  font-weight:500;line-height:1.32;letter-spacing:-.015em;}
.strip-quote .accent{color:var(--L4);font-style:normal;}
.strip-attr{text-align:center;font-family:var(--mono);font-size:.74rem;

/* ════════════════════════ I18N ════════════════════════ */
function isZh(){ return document.body.classList.contains('zh'); }
function applyLang(lang){
  document.body.classList.toggle('zh', lang==='zh');
  localStorage.setItem('re-lang', lang);
  document.documentElement.lang = lang==='zh' ? 'zh-CN' : 'en';
  document.getElementById('lang-btn').textContent = lang==='zh' ? 'EN' : '中文';
  document.querySelectorAll('input[data-en-placeholder]').forEach(el=>{
    el.placeholder = lang==='zh' ? el.dataset.zhPlaceholder : el.dataset.enPlaceholder;
  });
  renderMap(curScale); renderCausePresets(); renderHidList(); renderHid(curHid); renderSim(); renderKG();
}
document.getElementById('lang-btn').onclick=()=>applyLang(document.body.classList.contains('zh')?'en':'zh');
applyLang(localStorage.getItem('re-lang') || 'en');

/* ════════════════════════ MODULE 1 — REALITY MAP ════════════════════════ */
let curScale = 4; // start at "mind"
function renderMap(idx){
  curScale = idx;
  const lang = isZh()?'zh':'en';
  // Zoom buttons
  const zoom = document.getElementById('map-zoom');
  zoom.innerHTML = SCALES.map((s,i)=>`<button class="${i===idx?'active':''}" data-i="${i}">${s.name[lang]} <span style="opacity:.5">· ${s.scope}</span></button>`).join('');
  zoom.querySelectorAll('button').forEach(b=>b.onclick=()=>renderMap(+b.dataset.i));
  // SVG
  const svg = document.getElementById('map-svg');
  let html = '';
  // Connector path
  html += `<polyline points="${SCALES.map(s=>`${s.x},${s.y}`).join(' ')}" fill="none" stroke="rgba(167,139,250,.3)" stroke-width="1" stroke-dasharray="3 4"/>`;
  // Layer bands
  const bands = [{l:1,y:60},{l:2,y:200},{l:3,y:160},{l:4,y:200},{l:5,y:260}];
  // Nodes
  SCALES.forEach((s,i)=>{
    const colorVar = `var(--L${s.layer})`;
    const isActive = i===idx;
    const r = isActive ? 26 : 14;
    html += `<g class="map-node" data-i="${i}" style="cursor:pointer;">`;
    html += `<circle cx="${s.x}" cy="${s.y}" r="${r+18}" fill="none" stroke="${colorVar}" stroke-width="${isActive?1.5:0}" opacity="${isActive?.5:0}"/>`;
    html += `<circle cx="${s.x}" cy="${s.y}" r="${r}" fill="${isActive?colorVar:'rgba(16,20,42,.95)'}" stroke="${colorVar}" stroke-width="${isActive?2.5:1.6}"/>`;
    html += `<text x="${s.x}" y="${s.y+r+24}" text-anchor="middle" fill="${isActive?colorVar:'#8d92b3'}" font-family="JetBrains Mono" font-size="11" font-weight="${isActive?600:400}">${s.name[lang]}</text>`;
    html += `<text x="${s.x}" y="${s.y+r+40}" text-anchor="middle" fill="#4d5170" font-family="JetBrains Mono" font-size="10">${s.scope}</text>`;
    html += `</g>`;
  });
  svg.innerHTML = html;
  svg.querySelectorAll('.map-node').forEach(g=>g.onclick=()=>renderMap(+g.dataset.i));
  // Detail
  const prev = SCALES[idx-1], cur = SCALES[idx], next = SCALES[idx+1];
  const card = (s, label) => s ? `
    <div class="scale-card" style="border-left-color:var(--L${s.layer});">
      <div class="num">${label}</div>
      <div class="what" style="color:var(--L${s.layer});">${s.name[lang]} · ${s.scope}</div>
      <div class="desc">${s.desc[lang]}</div>
      <div class="ex">${s.ex[lang]}</div>
    </div>
  ` : `<div class="scale-card" style="border-left-color:transparent;opacity:.4;"><div class="num">${label}</div><div class="what">—</div></div>`;
  document.getElementById('map-detail').innerHTML = card(prev, lang==='zh'?'尺度之下':'ZOOM IN ↓') + card(cur, lang==='zh'?'当前尺度':'CURRENT SCALE') + card(next, lang==='zh'?'尺度之上':'ZOOM OUT ↑');
}
renderMap(curScale);

/* ════════════════════════ MODULE 2 — CAUSALITY ════════════════════════ */
function renderCausePresets(){
  const lang = isZh()?'zh':'en';
  document.getElementById('cause-presets').innerHTML = CAUSE_PRESETS.map((p,i)=>
    `<button class="cause-chip" data-i="${i}">${p[lang]}</button>`).join('');
  document.querySelectorAll('.cause-chip').forEach(b=>b.onclick=()=>{
    document.getElementById('cause-input').value = CAUSE_PRESETS[+b.dataset.i][lang];
    runCause(+b.dataset.i);
  });
}
function runCause(presetIdx){
  const lang = isZh()?'zh':'en';
  const q = document.getElementById('cause-input').value.trim();
  let preset;
  if (typeof presetIdx === 'number') preset = CAUSE_PRESETS[presetIdx];
  else preset = CAUSE_PRESETS.find(p=>p.en.toLowerCase()===q.toLowerCase() || p.zh===q);
  if (!preset) preset = generateCauseChain(q, lang);
  const tree = document.getElementById('cause-tree');
  const layerNames = {1:'L1·PHYSICAL', 2:'L2·BIOLOGICAL', 3:'L3·COGNITIVE', 4:'L4·SOCIAL', 5:'L5·DIGITAL'};
  const layerNamesZh = {1:'L1·物理', 2:'L2·生物', 3:'L3·认知', 4:'L4·社会', 5:'L5·数字'};
  const links = preset.chain.map((c,i)=>`
    <div class="cause-link l${c.l}">
      <div class="step">${lang==='zh'?'层 '+c.l:'Step '+(i+1)}</div>
      <div>
        <span class="layer-tag">${lang==='zh'?layerNamesZh[c.l]:layerNames[c.l]}</span>
        <div class="text">${c[lang]}</div>
      </div>
    </div>
  `).join('<div class="cause-arrow">↓</div>');
  tree.innerHTML = `
    <div class="cause-phenom">${q || preset[lang]}</div>
    <div class="cause-chain">${links}</div>
    <div class="cause-summary">${preset.summary[lang]}</div>
  `;
}
function generateCauseChain(q, lang){
  // Procedural fallback for arbitrary input
  return {
    chain: [
      {l:5, en:`A digital trace of "${q}" appears in someone's feed`, zh:`关于"${q}"的数字痕迹出现在某人的信息流中`},
      {l:4, en:`Coordinated social attention forms around it`, zh:`协调的社会注意力围绕它形成`},
      {l:3, en:`Individual minds form beliefs and emotional reactions`, zh:`个体心智形成信念与情感反应`},
      {l:2, en:`Bodies release cortisol, dopamine — biological resonance`, zh:`身体分泌皮质醇、多巴胺 —— 生物共振`},
      {l:1, en:`Energy flows: every signal, every neuron, every server uses joules`, zh:`能量流动：每个信号、每个神经元、每台服务器都消耗焦耳`},
    ],
    summary: lang==='zh'
      ? `任何现象 —— 包括"${q}" —— 在五个层级上同时存在。表面上的它，只是已经穿越了下方四层之后的剩余物。`
      : `Any phenomenon — including "${q}" — exists at all five layers simultaneously. The surface form is what remains after passing through the four layers beneath.`
  };
}
document.getElementById('cause-run').onclick = ()=>runCause();
document.getElementById('cause-input').addEventListener('keydown', e=>{ if(e.key==='Enter') runCause(); });
renderCausePresets();
document.getElementById('cause-input').value = CAUSE_PRESETS[0].en;
runCause(0);

/* ════════════════════════ MODULE 3 — HIDDEN STRUCTURES ════════════════════════ */
let curHid = 'social';
function renderHidList(){
  const lang = isZh()?'zh':'en';
  document.getElementById('hid-list').innerHTML = HIDDEN_SYSTEMS.map(s=>`
    <div class="hid-item ${s.id===curHid?'active':''}" data-id="${s.id}">
      <div class="name">${s.name[lang]}</div>
      <div class="visible">${(lang==='zh'?'表面：':'SURFACE: ')}${s.visible[lang]}</div>
    </div>
  `).join('');
  document.querySelectorAll('.hid-item').forEach(el=>el.onclick=()=>{
    curHid = el.dataset.id; renderHidList(); renderHid(curHid);
  });
}
function renderHid(id){
  const lang = isZh()?'zh':'en';
  const s = HIDDEN_SYSTEMS.find(x=>x.id===id);
  document.getElementById('hid-detail').innerHTML = `
    <div class="surface">${lang==='zh'?'表面':'SURFACE'} · ${s.visible[lang]}</div>
    <div class="name">${s.name[lang]}</div>
    <div class="hid-row">
      <div class="hid-card incentives">
        <div class="k">${lang==='zh'?'激励梯度':'INCENTIVES'}</div>
        <h5>${lang==='zh'?'谁靠什么获利':'Who benefits from what'}</h5>
        <p>${s.incentives[lang]}</p>
        <ul>${(lang==='zh'?s.incentives.list.zh:s.incentives.list.en).map(x=>`<li>${x}</li>`).join('')}</ul>
      </div>
      <div class="hid-card power">
        <div class="k">${lang==='zh'?'权力结构':'POWER'}</div>
        <h5>${lang==='zh'?'谁能改变规则':'Who can change the rules'}</h5>
        <p>${s.power[lang]}</p>
        <ul>${(lang==='zh'?s.power.list.zh:s.power.list.en).map(x=>`<li>${x}</li>`).join('')}</ul>
      </div>
      <div class="hid-card info">
        <div class="k">${lang==='zh'?'信息流':'INFORMATION'}</div>
        <h5>${lang==='zh'?'谁知道什么、何时':'Who knows what, when'}</h5>
        <p>${s.info[lang]}</p>
        <ul>${(lang==='zh'?s.info.list.zh:s.info.list.en).map(x=>`<li>${x}</li>`).join('')}</ul>
      </div>
    </div>
    <div class="punch">${s.punch[lang]}</div>
  `;
}
renderHidList(); renderHid(curHid);

/* ════════════════════════ MODULE 4 — SIMULATOR ════════════════════════ */
const simState = {};
SIM_VARS.forEach(v=>simState[v.id]=v.init);
function renderSim(){
  const lang = isZh()?'zh':'en';
  document.getElementById('sim-vars').innerHTML = SIM_VARS.map(v=>`
    <div class="sim-var">
      <div class="top">
        <div class="lbl">${v.name[lang]}</div>
        <div class="val">${simState[v.id]}</div>
      </div>
      <input type="range" data-id="${v.id}" min="${v.min}" max="${v.max}" step="${v.step}" value="${simState[v.id]}">
      <div class="hint">${v.hint[lang]}</div>
    </div>
  `).join('');
  document.querySelectorAll('.sim-var input[type=range]').forEach(inp=>{
    inp.addEventListener('input', e=>{
      simState[e.target.dataset.id] = parseFloat(e.target.value);
      renderSim();
    });
  });
  // Effects: pull from currently focused (or first) variable
  const focused = SIM_VARS[0]; // show effects of first var, others follow same pattern
  // Show effects from ALL active variables aggregated
  let allFx = [];
  SIM_VARS.forEach(v=>{
    const isMoved = Math.abs(simState[v.id] - v.init) > v.step * .5;
    if (isMoved) {
      v.effects(simState[v.id]).forEach(fx=>allFx.push({...fx, source:v.name[lang]}));
    }
  });
  if (allFx.length === 0) {
    allFx = SIM_VARS[0].effects(simState[SIM_VARS[0].id]).map(fx=>({...fx,source:SIM_VARS[0].name[lang]}));
  }
  const layerNames = {1:'PHYS', 2:'BIO', 3:'COG', 4:'SOC', 5:'DIG'};
  const layerNamesZh = {1:'物理', 2:'生物', 3:'认知', 4:'社会', 5:'数字'};
  document.getElementById('sim-effects').innerHTML = allFx.map(fx=>`
    <div class="sim-fx l${fx.l}">
      <div class="tag">L${fx.l} · ${lang==='zh'?layerNamesZh[fx.l]:layerNames[fx.l]}</div>
      <div class="desc">${fx[lang]}</div>
      <div class="delta ${fx.delta||''}">${fx.delta==='dn'?'▼':fx.delta==='up'?'▲':'•'}</div>
    </div>
  `).join('');
}
renderSim();

/* ════════════════════════ MODULE 5 — KNOWLEDGE GRAPH ════════════════════════ */
const kgFilters = new Set([1,2,3,4,5]);
let kgSearch = '';
let kgActive = null;
function renderKG(){
  const lang = isZh()?'zh':'en';
  const svg = document.getElementById('kg-svg');
  const visible = new Set(KG.nodes.filter(n=>{
    if (!kgFilters.has(n.l)) return false;
    if (kgSearch && !n.name[lang].toLowerCase().includes(kgSearch.toLowerCase()) && !n.id.includes(kgSearch.toLowerCase())) return false;
    return true;
  }).map(n=>n.id));
  let html = '';
  // Edges
  KG.edges.forEach(([a,b])=>{
    if (!visible.has(a) || !visible.has(b)) return;
    const na = KG.nodes.find(n=>n.id===a), nb = KG.nodes.find(n=>n.id===b);
    const isActive = kgActive===a || kgActive===b;
    html += `<line x1="${na.x}" y1="${na.y}" x2="${nb.x}" y2="${nb.y}" stroke="${isActive?'#a78bfa':'rgba(167,139,250,.18)'}" stroke-width="${isActive?1.5:0.7}" opacity="${isActive?.9:.5}"/>`;
  });
  // Nodes
  KG.nodes.forEach(n=>{
    if (!visible.has(n.id)) return;
    const isActive = kgActive===n.id;
    const r = isActive ? 14 : 9;
    html += `<g class="kg-node" data-id="${n.id}" style="cursor:pointer;">`;
    html += `<circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${isActive?`var(--L${n.l})`:`rgba(16,20,42,.95)`}" stroke="var(--L${n.l})" stroke-width="${isActive?2.5:1.4}"/>`;
    html += `<text x="${n.x}" y="${n.y - r - 6}" text-anchor="middle" fill="#e9ecf6" font-family="IBM Plex Sans" font-size="11" font-weight="${isActive?600:400}" pointer-events="none">${n.name[lang]}</text>`;
    html += `</g>`;
  });
  svg.innerHTML = html;
  svg.querySelectorAll('.kg-node').forEach(g=>g.onclick=()=>{ kgActive = g.dataset.id; renderKG(); });
  // Info
  const info = document.getElementById('kg-info');
  if (kgActive) {
    const n = KG.nodes.find(x=>x.id===kgActive);
    const linked = KG.edges.filter(([a,b])=>a===kgActive||b===kgActive).map(([a,b])=>{
      const t = KG.nodes.find(x=>x.id===(a===kgActive?b:a));
      return t.name[lang];
    });
    const layerNames = {1:'L1 · PHYSICAL', 2:'L2 · BIOLOGICAL', 3:'L3 · COGNITIVE', 4:'L4 · SOCIAL', 5:'L5 · DIGITAL'};
    const layerNamesZh = {1:'L1 · 物理', 2:'L2 · 生物', 3:'L3 · 认知', 4:'L4 · 社会', 5:'L5 · 数字'};
    info.classList.add('show');
    info.innerHTML = `
      <div class="layer" style="color:var(--L${n.l});">${lang==='zh'?layerNamesZh[n.l]:layerNames[n.l]}</div>
      <div class="name">${n.name[lang]}</div>
      <p>${n.desc[lang]}</p>
      <div class="links"><strong>${lang==='zh'?'连接到':'Linked'}:</strong> ${linked.join(' · ')}</div>
    `;
  } else {
    info.classList.remove('show');
  }
  // Filters
  document.querySelectorAll('.kg-filter').forEach(b=>{
    b.classList.toggle('active', kgFilters.has(+b.dataset.l));
  });
}
document.querySelectorAll('.kg-filter').forEach(b=>b.onclick=()=>{
  const l = +b.dataset.l;
  if (kgFilters.has(l)) kgFilters.delete(l); else kgFilters.add(l);
  renderKG();
});
document.getElementById('kg-search').addEventListener('input', e=>{ kgSearch = e.target.value; renderKG(); });
renderKG();

/* ════════════════════════ FADE-UP ════════════════════════ */
const io = new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting && e.target.classList.add('in')), {threshold:.12});
document.querySelectorAll('.section-head, .map-stage, .cause-stage, .hid-stage, .sim-stage, .kg-stage').forEach(el=>{
  el.classList.add('fadeup'); io.observe(el);
});
</script>
